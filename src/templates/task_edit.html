{% extends "base.html" %}

{% block title %}Редактирование задачи{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Редактирование</h2>
        <form action="/tasks/{{ task.id }}/edit" method="POST" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="title">Название задачи</label>
                <input class="form-input" type="text" id="title" name="title" value="{{ task.title }}" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Описание</label>
                <textarea class="form-input" id="description" name="description" rows="4">{{ task.description }}</textarea>
            </div>

            <button type="submit" class="auth-btn">Сохранить</button>
            <a href="/" style="display: block; text-align: center; margin-top: 15px; color: #6b7280; text-decoration: none;">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
